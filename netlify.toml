[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Ensure Googlebot can access the site
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "all"
    Access-Control-Allow-Origin = "*"

# Ensure static assets are served properly
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# First-party umami proxy: adblock-resistant analytics under /stats/
# Target: Umami Cloud (decision July 2026 — no VPS shell access; see docs/umami-vps-setup.md history)
[[redirects]]
  from = "/stats/script.js"
  to = "https://cloud.umami.is/script.js"
  status = 200

[[redirects]]
  from = "/stats/api/*"
  to = "https://cloud.umami.is/api/:splat"
  status = 200

# Markdown mirrors + llms.txt: cache 1h, keep HTML canonical out of duplicate-content risk
[[headers]]
  for = "/*.md"
  [headers.values]
    X-Robots-Tag = "noindex"
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/markdown; charset=utf-8"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Security headers + allow sitemap-presenter iframe
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    X-Frame-Options = "ALLOW-FROM https://sitemap-presenter.netlify.app"
    Content-Security-Policy = "frame-ancestors 'self' https://sitemap-presenter.netlify.app"