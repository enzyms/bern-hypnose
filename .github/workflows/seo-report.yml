name: Weekly SEO report

on:
  schedule:
    # Every Monday 06:15 UTC
    - cron: '15 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run SEO report
        env:
          MANGOOLS_API_KEY: ${{ secrets.MANGOOLS_API_KEY }}
        run: node scripts/seo-report.js

      - name: Commit report
        run: |
          git config user.name "seo-report-bot"
          git config user.email "actions@github.com"
          git add reports/seo src/data/seo-metrics.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Add weekly SEO report $(date -u +%G-W%V)"
          git push
